<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NIPGL Excel Parser Debug</title>
<style>
  body{font-family:monospace;max-width:900px;margin:30px auto;padding:0 20px;background:#1a1a2e;color:#e8e8f0}
  h1{color:#90b0ff;font-size:18px}
  .upload{background:#2a2a4a;border:2px dashed #4a4a8a;border-radius:8px;padding:20px;text-align:center;margin:16px 0}
  input[type=file]{color:#e8e8f0}
  button{background:#1a2e5a;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin-top:10px}
  button:hover{background:#243d78}
  button:disabled{opacity:.5}
  #log{background:#0d0d1a;border:1px solid #3a3a6a;border-radius:6px;padding:16px;margin-top:16px;white-space:pre-wrap;font-size:12px;line-height:1.6;min-height:100px;color:#b0ffa0}
  .error{color:#ff8080}
  .label{color:#ffcc80;font-weight:bold}
  p{color:#aaa;font-size:13px}
</style>
</head>
<body>
<h1>🔍 NIPGL Excel Parser Debug</h1>
<p>Upload a scorecard .xlsx file to see exactly what the parser extracts from it.
   Must be logged in to WordPress as admin first.</p>

<div class="upload">
  <input type="file" id="file" accept=".xlsx,.xls"><br>
  <button id="go" disabled>Run Parser Debug</button>
</div>

<div id="log">Output will appear here…</div>

<script>
var fileInput = document.getElementById('file');
var goBtn     = document.getElementById('go');
var logEl     = document.getElementById('log');

fileInput.addEventListener('change', function(){
  goBtn.disabled = !fileInput.files[0];
});

goBtn.addEventListener('click', function(){
  var file = fileInput.files[0];
  if (!file) return;

  goBtn.disabled   = true;
  goBtn.textContent = '⏳ Running…';
  logEl.textContent = 'Uploading and parsing…';

  // Get nonce from WordPress
  var ajaxUrl = '/wp-admin/admin-ajax.php';

  var fd = new FormData();
  fd.append('action', 'nipgl_debug_excel');
  fd.append('excel',  file);

  fetch(ajaxUrl, {method:'POST', body:fd, credentials:'include'})
    .then(function(r){ return r.json(); })
    .then(function(data){
      goBtn.disabled   = false;
      goBtn.textContent = 'Run Parser Debug';
      if (data && data.log) {
        logEl.textContent = data.log;
      } else {
        logEl.textContent = 'Unexpected response:\n' + JSON.stringify(data, null, 2);
      }
    })
    .catch(function(err){
      goBtn.disabled   = false;
      goBtn.textContent = 'Run Parser Debug';
      logEl.textContent = 'Network error: ' + err.message
        + '\n\nMake sure you are logged in to WordPress as admin first.\n'
        + 'Open http://localhost:8080/wp-admin in another tab, log in, then try again.';
    });
});
</script>
</body>
</html>
